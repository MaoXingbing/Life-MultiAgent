# Chroma 向量数据库配置
collection_name: agent              # 集合名称，用于存储向量数据
persist_directory: chroma_db        # 向量数据库持久化存储目录
k: 3                                # 检索时返回的最相似文档数量

# 知识库文件配置
data_path: data                     # 知识库文件存放路径
md5_hex_store: md5.txt              # 文件 MD5 校验值存储文件，用于检测文件变化
allow_knowledge_file_type: ["txt","pdf"]  # 允许加载的知识库文件类型

# 文本分块配置
chunk_size: 200                     # 每个文本块的最大字符数
chunk_overlap: 20                   # 相邻文本块之间的重叠字符数
separators: ["\n\n","\n",".","!","?","。"," ",""]  # 文本分块时使用的分隔符列表，按优先级排序
